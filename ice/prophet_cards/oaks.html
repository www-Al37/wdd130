<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dallin H. Oaks</title>
    <style>
        /* Basic body setup */
        body { 
            background-color: #FFECD7;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center; /* Centers everything inside the body */
            padding-top: 50px;
        }

        /* The blue box */
        .card-box {
            background-color: #008db1;
            width: 350px;
            /* Using margin auto is the classic way to center a box */
            margin-left: auto;
            margin-right: auto;
            padding: 40px;
            /* Added 'solid' so the border actually shows up */
            border: 10px solid #004e63;
            border-radius: 25px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 0px;
        }

        /* The link styling */
        .subtitle-link {
            color: #91E4FB;
            font-size: 14px;
        }

        /* Making the image fit inside the box */
        .prophet-image {
            width: 250px;
            border: 5px solid white;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        /* Simple list styling */
        ul {
            color: white;
            text-align: left; /* Lists look weird centered, so we align left */
            padding-left: 60px; /* Pushes it toward the middle */
        }
    </style>
</head>
<body>

    <div class="card-box">
        <h1>Dallin H. Oaks</h1>
        
        <a href="https://churchofjesuschrist.org" class="subtitle-link">
            18th President of the Church of Jesus Christ of Latter-day Saints
        </a>

        <br> <img src="images/oaks.webp" class="prophet-image">

        <ul>
            <li>Born: Aug 12, 1932</li>
            <li>Apostle: Apr 7, 1984</li>
            <li>Prophet: Oct 14, 2025</li>
        </ul>
    </div>

</body>
</html>
